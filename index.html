<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pelle Baukasten</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h2 class="logo">PELLE</h2>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div id="menu" class="menu hidden">
      <p>Account</p>
      <p>Einstellungen</p>
      <p>Support</p>
    </div>
  </header>

  <main class="app">

    <section class="hero">
      <p class="tag">PELLE SYSTEM</p>
      <h1>Pelle Baukasten</h1>
      <p id="subtitle">Private Website – nur für dich</p>

      <div id="loginArea" class="login-area">
        <input type="password" id="pw" placeholder="Passwort">
        <button onclick="login()">Einloggen</button>
      </div>
    </section>

    <section id="content" class="hidden">
      <div class="topbar">
        <h2>Willkommen Pelle 🔥</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <nav class="nav">
        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('projekte')">Projekte</button>
        <button onclick="showPage('notizen')">Notizen</button>
      </nav>

      <div id="dashboard" class="page">
        <h3>Dashboard</h3>
        <p>Alles läuft 🔥</p>
      </div>

      <div id="projekte" class="page hidden">
        <h3>Projekte</h3>
        <p>Hier kommen Projekte rein.</p>
      </div>

      <div id="notizen" class="page hidden">
        <h3>Notizen</h3>
        <p>Hier kommen Notizen rein.</p>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
