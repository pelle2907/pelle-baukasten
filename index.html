<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pelle Baukasten</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card">
    <h1>Pelle Baukasten</h1>
    <p id="subtitle">Private Website – nur für dich</p>

    <div id="loginArea" class="login-area">
      <input type="password" id="pw" placeholder="Passwort">
      <button onclick="login()">Einloggen</button>
    </div>

    <div id="content" class="hidden">
      <div class="topbar">
        <h2>Willkommen Pelle 🔥</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <div class="button-row">
        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('projekte')">Projekte</button>
        <button onclick="showPage('notizen')">Notizen</button>
      </div>

      <div id="dashboard" class="page">
        <h3>Dashboard</h3>
        <p>Das ist dein privater Bereich.</p>
      </div>

      <div id="projekte" class="page hidden">
        <h3>Projekte</h3>
        <p>Hier kommen später deine Website-Projekte rein.</p>
      </div>

      <div id="notizen" class="page hidden">
        <h3>Notizen</h3>
        <p>Hier kannst du später Ideen, Preise und Kundeninfos sammeln.</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
