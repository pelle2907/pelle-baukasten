<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pelle Baukasten</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background"></div>

  <main class="card">
    <p class="tag">PRIVATE WEBSITE</p>

    <h1>Pelle Baukasten</h1>
    <p class="subtitle">Mein eigener digitaler Bereich – selbst gebaut, online gestellt und ständig erweitert.</p>

    <div class="login-box">
      <input type="password" id="pw" placeholder="Passwort eingeben">
      <button onclick="login()">Einloggen</button>
    </div>

    <div id="content" class="content hidden">

      <div class="button-row">
        <button class="secondary" onclick="showPage('dashboard')">Dashboard</button>
        <button class="secondary" onclick="showPage('projekte')">Projekte</button>
        <button class="secondary" onclick="showPage('notizen')">Notizen</button>
      </div>

      <div id="dashboard" class="page">
        <h2>Dashboard</h2>
        <p>Willkommen in deinem System.</p>
      </div>

      <div id="projekte" class="page hidden">
        <h2>Projekte</h2>
        <p>Hier kommen deine Projekte rein.</p>
      </div>

      <div id="notizen" class="page hidden">
        <h2>Notizen</h2>
        <p>Hier kannst du später Sachen speichern.</p>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
