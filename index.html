<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pelle Baukasten</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background"></div>

  <main class="card">
    <p class="tag">PRIVATE WEBSITE</p>

    <h1>Pelle Baukasten</h1>
    <p class="subtitle">Mein eigener digitaler Bereich – selbst gebaut, online gestellt und ständig erweitert.</p>

    <div class="login-box">
      <input type="password" id="pw" placeholder="Passwort eingeben">
      <button onclick="login()">Einloggen</button>
    </div>

    <div id="content" class="content hidden">
      <h2>Willkommen Pelle 🔥</h2>
      <p>Du bist im privaten Bereich.</p>

      <div class="button-row">
        <button class="secondary">Dashboard</button>
        <button class="secondary">Projekte</button>
        <button class="secondary">Notizen</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
