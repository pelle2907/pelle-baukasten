<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Webuild</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="brand" onclick="showPage('home')">Future Webuild</div>

  <div class="header-actions">
    <button class="icon-btn" onclick="showPage('cart')">
      <svg viewBox="0 0 24 24" class="icon">
        <path d="M6 8h12l-1 12H7L6 8Z"></path>
        <path d="M9 8V6a3 3 0 0 1 6 0v2"></path>
      </svg>
    </button>

    <button class="icon-btn" onclick="toggleMenu()">☰</button>
  </div>

  <div id="menu" class="menu hidden">
    <button onclick="openPage('contact')">Kontakt</button>
    <button onclick="openPage('about')">Über uns</button>
    <button onclick="openPage('language')">Sprache</button>
    <button onclick="openPage('orders')">Bestellungen</button>
    <button onclick="openPage('account')">Konto erstellen / Login</button>
  </div>
</header>

<main>

<!-- START -->
<section id="home" class="page">
  <h1>Websites die verkaufen.</h1>
  <p>Moderne Websites & Online-Shops für echte Kunden.</p>

  <button onclick="showPage('packages')">Pakete ansehen</button>
  <button onclick="showPage('portfolio')">Portfolio ansehen</button>
</section>

<!-- PAKETE -->
<section id="packages" class="page hidden">
  <h1>Pakete</h1>

  <button onclick="addToCart('Starter',29)">Starter 29€</button>
  <button onclick="addToCart('Basic',59)">Basic 59€</button>
  <button onclick="addToCart('Plus',99)">Plus 99€</button>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="page hidden">
  <h1>Portfolio</h1>

  <button onclick="openCafe()">Café Milano ansehen</button>
</section>

<!-- WARENKORB -->
<section id="cart" class="page hidden">
  <h1>Warenkorb</h1>
  <div id="cartItems"></div>
  <p>Gesamt: <span id="total">0</span> €</p>
</section>

<!-- KONTAKT (JETZT ECHT) -->
<section id="contact" class="page hidden">
  <h1>Kontakt</h1>

  <form action="https://formspree.io/f/mbdwldyl" method="POST">

    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>

    <select name="package">
      <option>Starter</option>
      <option>Basic</option>
      <option>Plus</option>
    </select>

    <textarea name="message" placeholder="Nachricht" required></textarea>

    <button type="submit">Senden</button>
  </form>
</section>

<!-- ÜBER UNS -->
<section id="about" class="page hidden">
  <h1>Über uns</h1>
  <p>Future Webuild erstellt moderne Websites für Unternehmen.</p>
</section>

<!-- SPRACHE -->
<section id="language" class="page hidden">
  <h1>Sprache</h1>
  <button>Deutsch</button>
  <button>English</button>
</section>

<!-- BESTELLUNGEN -->
<section id="orders" class="page hidden">
  <h1>Bestellungen</h1>
  <p>Noch keine Bestellungen.</p>
</section>

<!-- KONTO -->
<section id="account" class="page hidden">
  <h1>Login</h1>
  <input type="password" id="pw" placeholder="Passwort">
  <button onclick="login()">Login</button>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
